esphome:
  name: climat-komnata
  friendly_name: climat_komnata

esp8266:
  board: d1_mini_lite

logger:
  # If UART is wired to the hardware serial pins used by ESP logging,
  # disable the serial logger to avoid conflicts with Midea communication.
  baud_rate: 0

api:
  encryption:
    key: !secret esphome_api_key

ota:
  - platform: esphome
    password: !secret esphome_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Climat-Komnata Fallback Hotspot"
    password: !secret climat_fallback_password

captive_portal:

uart:
  # Wiring rule:
  # ESP TX -> Midea RX
  # ESP RX -> Midea TX
  # GND must be common on both sides
  tx_pin: GPIO1
  rx_pin: GPIO3
  baud_rate: 9600

climate:
  - platform: midea
    name: climat_komnata
    period: 1s
    timeout: 2s
    num_attempts: 3
    autoconf: true
    beeper: true
    visual:
      min_temperature: 17 °C
      max_temperature: 30 °C
      temperature_step: 1 °C
    supported_modes:
      - FAN_ONLY
      - HEAT_COOL
      - COOL
      - HEAT
      - DRY
    custom_fan_modes:
      - SILENT
      - TURBO
    supported_presets:
      - ECO
      - BOOST
      - SLEEP
    custom_presets:
      - FREEZE_PROTECTION
    supported_swing_modes:
      - VERTICAL
      - HORIZONTAL
      - BOTH
